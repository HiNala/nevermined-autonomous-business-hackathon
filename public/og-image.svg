<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#0f0f1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#b45309"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#c97d4e" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0a0a0f" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Subtle grid lines -->
  <g stroke="#ffffff" stroke-opacity="0.025" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="240" y1="0" x2="240" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/>
  </g>

  <!-- Top accent line -->
  <rect x="80" y="80" width="120" height="2" fill="url(#accent)" opacity="0.8"/>

  <!-- Logo mark -->
  <rect x="80" y="104" width="18" height="18" rx="3" fill="none" stroke="#d97706" stroke-width="1.5" opacity="0.7" transform="rotate(45 89 113)"/>
  <circle cx="89" cy="113" r="3" fill="#d97706"/>

  <!-- Site name -->
  <text x="112" y="120" font-family="monospace" font-size="13" font-weight="700" letter-spacing="4" fill="#d97706" opacity="0.9">AUTO-BUSINESS</text>

  <!-- Main headline -->
  <text x="80" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="700" fill="#f5f0eb" letter-spacing="-2">Describe the work.</text>
  <text x="80" y="348" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="700" letter-spacing="-2">
    <tspan fill="#d97706">Agents</tspan>
    <tspan fill="#f5f0eb"> build it.</tspan>
  </text>

  <!-- Sub-description -->
  <text x="80" y="410" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#9ca3af" letter-spacing="0">Four specialist AI agents · Pay per deliverable · Powered by Nevermined</text>

  <!-- Agent pipeline badges -->
  <g font-family="monospace" font-size="12" font-weight="600">
    <!-- Strategist -->
    <rect x="80" y="468" width="130" height="32" rx="8" fill="#7c3aed" fill-opacity="0.15" stroke="#7c3aed" stroke-opacity="0.4" stroke-width="1"/>
    <text x="145" y="489" text-anchor="middle" fill="#a78bfa">Strategist</text>

    <!-- Arrow -->
    <text x="222" y="489" fill="#4b5563" font-size="14">→</text>

    <!-- Researcher -->
    <rect x="240" y="468" width="130" height="32" rx="8" fill="#0ea5e9" fill-opacity="0.12" stroke="#0ea5e9" stroke-opacity="0.35" stroke-width="1"/>
    <text x="305" y="489" text-anchor="middle" fill="#38bdf8">Researcher</text>

    <!-- Arrow -->
    <text x="382" y="489" fill="#4b5563" font-size="14">→</text>

    <!-- Buyer -->
    <rect x="400" y="468" width="100" height="32" rx="8" fill="#f59e0b" fill-opacity="0.12" stroke="#f59e0b" stroke-opacity="0.35" stroke-width="1"/>
    <text x="450" y="489" text-anchor="middle" fill="#fbbf24">Buyer</text>

    <!-- Arrow -->
    <text x="512" y="489" fill="#4b5563" font-size="14">→</text>

    <!-- Seller -->
    <rect x="530" y="468" width="100" height="32" rx="8" fill="#ef4444" fill-opacity="0.12" stroke="#ef4444" stroke-opacity="0.35" stroke-width="1"/>
    <text x="580" y="489" text-anchor="middle" fill="#f87171">Seller</text>
  </g>

  <!-- Right side — NVM badge -->
  <rect x="960" y="468" width="160" height="32" rx="8" fill="#d97706" fill-opacity="0.10" stroke="#d97706" stroke-opacity="0.3" stroke-width="1"/>
  <text x="1040" y="489" text-anchor="middle" font-family="monospace" font-size="11" font-weight="700" fill="#d97706">Nevermined x402</text>

  <!-- Bottom border -->
  <rect x="0" y="620" width="1200" height="2" fill="url(#accent)" opacity="0.25"/>
</svg>
